<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa da Pizza</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f5f5f5;
    }

    /* HEADER */
    .header {
      background: #d62828;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: 600;
      font-size: 18px;
    }

    .location {
  background: white;
  padding: 12px 15px;
  font-size: 14px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

    /* BANNER */
    .banner {
      width: 100%;
      overflow: hidden;
    }

    .banner img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    /* SEÇÃO */
    .section {
      padding: 15px;
    }

    .section h2 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
    }

    .price {
      color: #d62828;
      font-weight: bold;
      margin-top: 5px;
    }

    /* BOTÃO */
    .cta {
      position: fixed;
      bottom: 70px;
      left: 15px;
      right: 15px;
    }

    .cta button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 30px;
      background: #d62828;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    /* MENU INFERIOR */
    .bottom-menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ddd;
    }

    .bottom-menu div {
      font-size: 12px;
      text-align: center;
      color: #555;
    }

    .modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

.modal-content h3 {
  margin-bottom: 10px;
}

.modal-content p {
  font-size: 14px;
  margin-bottom: 15px;
}

.modal-content input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
  display: none;
}

.modal-buttons {
  display: flex;
  gap: 10px;
}

.modal-buttons button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.confirmar {
  background: #d62828;
  color: white;
}

.editar {
  background: #eee;
}

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="location" onclick="capturarLocalizacao()" id="locationBox">
  📍 Detectar minha localização
</div>

  <!-- BANNER -->
  <div class="banner">
    <img src="https://images.unsplash.com/photo-1601924638867-3ec2fbbd6f5b" alt="Pizza">
  </div>

  <!-- OFERTAS -->
  <div class="section">
    <h2>🔥 Ofertas do Dia</h2>

    <div class="cards">

      <div class="card" onclick="pedir()">
        <img src="https://images.unsplash.com/photo-1594007654729-407eedc4fe24">
        <div class="card-content">
          <div class="title">2 Pizzas Grandes</div>
          <div class="price">R$ 49,90</div>
        </div>
      </div>

      <div class="card" onclick="pedir()">
        <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
        <div class="card-content">
          <div class="title">Pizza + Refri 2L</div>
          <div class="price">R$ 39,90</div>
        </div>
      </div>

      <div class="card" onclick="pedir()">
        <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
        <div class="card-content">
          <div class="title">Marmita Completa</div>
          <div class="price">R$ 16,90</div>
        </div>
      </div>

      <div class="card" onclick="pedir()">
        <img src="https://images.unsplash.com/photo-1585238342028-4f90d27c7e4a">
        <div class="card-content">
          <div class="title">Salgados Variados</div>
          <div class="price">A partir de R$ 5,00</div>
        </div>
      </div>

    </div>
  </div>

  <!-- CTA -->
  <div class="cta">
    <button onclick="pedir()">Fazer Pedido Agora</button>
  </div>

  <!-- MENU -->
  <div class="bottom-menu">
    <div>🏠 Home</div>
    <div>🍕 Menu</div>
    <div>🔥 Promo</div>
    <div>👤 Perfil</div>
  </div>

  <script>
  let enderecoAtual = "";
  const locationBox = document.getElementById("locationBox");

  // Se já tiver salvo
  if (localStorage.getItem("endereco")) {
    locationBox.innerHTML = "📍 " + localStorage.getItem("endereco");
  }

  async function capturarLocalizacao() {
  if (!navigator.geolocation) {
    alert("Geolocalização não suportada");
    return;
  }

  locationBox.innerHTML = "📡 Detectando localização...";

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      console.log("Lat:", lat, "Lon:", lon);

      try {
        const apiKey = "198b9ca02deb4a8fb9d697ec2010b8b3";

        const response = await fetch(
          `https://api.opencagedata.com/geocode/v1/json?q=${lat}+${lon}&key=${apiKey}&language=pt`
        );

        const data = await response.json();

        if (!data.results || data.results.length === 0) {
          throw new Error("Sem resultado");
        }

        const r = data.results[0].components;

        const endereco = `${r.road || ""}, ${r.house_number || ""} - ${r.suburb || ""}, ${r.city || ""}`;

        confirmarEndereco(endereco);

      } catch (error) {
        console.log(error);
        locationBox.innerHTML = "Erro ao buscar endereço ❌";
      }
    },
    (error) => {
      console.log(error);

      if (error.code === 1) {
        locationBox.innerHTML = "Permissão negada ❌";
      } else if (error.code === 2) {
        locationBox.innerHTML = "Localização indisponível ❌";
      } else if (error.code === 3) {
        locationBox.innerHTML = "Tempo esgotado ⏱️";
      } else {
        locationBox.innerHTML = "Erro desconhecido ❌";
      }
    },
    {
      enableHighAccuracy: true,
      timeout: 10000, // 🔥 não trava mais
      maximumAge: 0
    }
  );
}

  function confirmarEndereco(endereco) {
    enderecoAtual = endereco;

    document.getElementById("modalEndereco").style.display = "flex";
    document.getElementById("enderecoTexto").innerText = endereco;

    const input = document.getElementById("inputEndereco");
    input.style.display = "none";
  }

  function editarEndereco() {
    const input = document.getElementById("inputEndereco");
    input.style.display = "block";
    input.value = enderecoAtual;
  }

  function salvarEndereco() {
    const input = document.getElementById("inputEndereco");

    let enderecoFinal = enderecoAtual;

    if (input.style.display === "block" && input.value.trim() !== "") {
      enderecoFinal = input.value;
    }

    document.getElementById("locationBox").innerHTML = "📍 " + enderecoFinal;
    localStorage.setItem("endereco", enderecoFinal);

    document.getElementById("modalEndereco").style.display = "none";
  }

  function pedir() {
    let endereco = localStorage.getItem("endereco") || "";

    let mensagem = "Olá, quero fazer um pedido!\n";

    if (endereco) {
      mensagem += "📍 Endereço: " + endereco;
    }

    const url = "https://wa.me/5599999999999?text=" + encodeURIComponent(mensagem);

    window.location.href = url;
  }
</script>

<!-- MODAL DE ENDEREÇO -->
<div id="modalEndereco" class="modal">
  <div class="modal-content">
    <h3>📍 Confirme seu endereço</h3>

    <p id="enderecoTexto"></p>

    <input type="text" id="inputEndereco" placeholder="Digite seu endereço" />

    <div class="modal-buttons">
      <button class="confirmar" onclick="salvarEndereco()">Confirmar</button>
      <button class="editar" onclick="editarEndereco()">Editar</button>
    </div>
  </div>
</div>

</body>
</html>
