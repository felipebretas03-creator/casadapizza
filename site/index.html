<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa da Pizza</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f5f5f5;
}

/* TOPO */
.location {
  background: white;
  padding: 12px;
  font-size: 14px;
  border-bottom: 1px solid #eee;
}

/* HERO (🔑 menor igual antes) */
.hero {
  width: 100%;
  height: 250px;
  position: relative;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.9);
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
}

/* SEÇÃO */
.section {
  padding: 10px;
}

.section h2 {
  font-size: 16px;
  margin-bottom: 10px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px; /* 🔥 menor */
}

.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.title {
  font-size: 14px;
  font-weight: 600;
}

.price {
  color: #d62828;
  font-weight: bold;
  margin: 4px 0;
}

/* BOTÃO */
.add-btn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #d62828;
  color: white;
  font-size: 13px;
  font-weight: 600;
  margin-top: 6px;
}

.add-btn:active {
  transform: scale(0.96);
}

/* MENU */
.bottom-menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  border-top: 1px solid #eee;
}

.menu-item {
  text-align: center;
  font-size: 11px;
  color: #555;
}

.menu-item span {
  display: block;
  font-size: 18px;
}

.menu-item p {
  margin-top: 2px;
}

.menu-item:active {
  transform: scale(0.9);
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BOTÃO CONFIRMAR */
.confirmar {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #d62828;
  color: white;
  margin-top: 10px;
}

/* LISTA */
.endereco-item {
  background: #f5f5f5;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 8px;
}

.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.popup-content {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
}

.popup-content h3 {
  margin-bottom: 10px;
}

.popup-content label {
  display: block;
  margin-top: 10px;
  font-size: 13px;
}

.popup-content select,
.popup-content textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.popup-content textarea {
  resize: none;
  height: 80px;
}

.opcoes-preparo {
  margin-top: 8px;
}

.opcao-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px;
  border-radius: 12px;
  background: #f7f7f7;
  margin-bottom: 10px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s ease;
  position: relative;
}

.opcao-card input {
  display: none;
}

/* QUANDO SELECIONADO */
.opcao-card:has(input:checked) {
  background: #fff5f5;
  border: 2px solid #d62828;
}

/* TEXTO */
.info {
  display: flex;
  flex-direction: column;
}

.titulo {
  font-weight: 600;
  font-size: 14px;
}

.preco {
  font-size: 13px;
}

.preco.positivo {
  color: #d62828;
}

.preco.negativo {
  color: #2a9d8f;
}

/* RADIO CUSTOM */
.radio {
  width: 18px;
  height: 18px;
  border: 2px solid #ccc;
  border-radius: 50%;
  position: relative;
}

.opcao-card:has(input:checked) .radio {
  border-color: #d62828;
}

.opcao-card:has(input:checked) .radio::after {
  content: "";
  width: 10px;
  height: 10px;
  background: #d62828;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.cart {
  position: relative;
}

#cart-count {
  position: absolute;
  top: -2px;
  right: 10px;
  background: #d62828;
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 20px;
  font-weight: bold;
}

</style>
</head>

<body>

<div id="locationBox" class="location">📍 Adicionar endereço</div>

<div class="hero">
<img src="hero.jpg.png">
</div>

<div class="section">
<h2>🔥 Ofertas</h2>
<div class="cards">
<div class="card">

  <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">

  <div class="card-content">
    <div class="title">Pizza + Refri 2L</div>
    <div class="price"> A partir de: R$ 15,00</div>

    <button class="add-btn" onclick="abrirPopup('Pizza + Refri 2L')">
  Escolher Esse!
</button>
  </div>

</div>
</div>
</div>

<div class="bottom-menu">

  <div class="menu-item">
    <span>🏠</span>
    <p>Home</p>
  </div>

  <div class="menu-item">
    <span>🍕</span>
    <p>Menu</p>
  </div>

  <div class="menu-item">
    <span>🔥</span>
    <p>Promo</p>
  </div>

  <!-- 🛒 NOVO -->
  <div class="menu-item cart" onclick="abrirCarrinho()">
    <span>🛒</span>
    <p>Carrinho</p>
    <div id="cart-count">0</div>
  </div>

  <div class="menu-item">
    <span>👤</span>
    <p>Perfil</p>
  </div>

</div>

<!-- MODAL -->
<div id="modalEndereco" class="modal">
<div class="modal-content">

<h3>📍 Seus endereços</h3>
<div id="listaEnderecos"></div>

<div class="opcao" onclick="capturarLocalizacao()">📡 Usar minha localização</div>
<div class="opcao" onclick="mostrarInput()">➕ Digitar endereço</div>

<input id="inputEndereco" placeholder="Digite endereço">
<select id="tipoEndereco">
<option>Casa</option>
<option>Trabalho</option>
</select>

<button class="confirmar" onclick="salvarNovoEndereco()">Salvar</button>

</div>
</div>

<div id="popupProduto" class="popup">
  <div class="popup-content">

    <h3 id="nomeProduto">Produto</h3>

    <!-- SABORES -->
    <label>Escolha o sabor:</label>
    <select id="sabor">
      <option>Calabresa</option>
      <option>Frango</option>
      <option>Portuguesa</option>
      <option>4 Queijos</option>
     </select>

     <label>Tipo de preparo:</label>

<div class="opcoes-preparo">

  <label class="opcao-card">
    <input type="radio" name="preparo" value="Assada" checked>
    
    <div class="info">
      <span class="titulo">Assada</span>
      <span class="preco positivo">R$ 20,00</span>
    </div>

    <div class="radio"></div>
  </label>

  <label class="opcao-card">
    <input type="radio" name="preparo" value="Pré-assada">
    
    <div class="info">
      <span class="titulo">Pré-assada</span>
      <span class="preco negativo">R$ 15,00</span>
    </div>

    <div class="radio"></div>
  </label>

</div>

    <!-- OBSERVAÇÃO -->
    <label>Observações:</label>
    <textarea id="observacao" placeholder="Ex: sem cebola, borda recheada..."></textarea>

    <!-- BOTÃO -->
    <button class="confirmar" onclick="confirmarProduto()">
      Adicionar ao carrinho

        </button>

  </div>
</div>

<script>

const locationBox = document.getElementById("locationBox");

/* ABRIR MODAL */
locationBox.onclick = () => {
  modalEndereco.style.display="flex";
  renderizarEnderecos();
};

/* SALVAR */
function salvarEndereco(e){
  locationBox.innerHTML="📍 "+e;
  localStorage.setItem("endereco",e);
  modalEndereco.style.display="none";
}

/* LISTA */
function getEnderecos(){
  return JSON.parse(localStorage.getItem("enderecos"))||[];
}

function salvarEnderecos(lista){
  localStorage.setItem("enderecos",JSON.stringify(lista));
}

function renderizarEnderecos(){
  listaEnderecos.innerHTML="";
  getEnderecos().forEach((e,i)=>{
    listaEnderecos.innerHTML+=`
    <div class="endereco-item" onclick="selecionarEndereco(${i})">
    ${e.tipo}<br>${e.endereco}
    </div>`;
  });
}

function selecionarEndereco(i){
  salvarEndereco(getEnderecos()[i].endereco);
}

/* INPUT */
function mostrarInput(){
  inputEndereco.style.display="block";
  tipoEndereco.style.display="block";
}

/* SALVAR NOVO */
function salvarNovoEndereco(){
  let e=inputEndereco.value;
  let t=tipoEndereco.value;
  if(!e) return alert("Digite endereço");

  let lista=getEnderecos();
  lista.push({tipo:t,endereco:e});
  salvarEnderecos(lista);
  salvarEndereco(e);
}

/* GEOLOCALIZAÇÃO */
function capturarLocalizacao(){

  const apiKey = "198b9ca02deb4a8fb9d697ec2010b8b3";

  locationBox.innerHTML = `
  <div class="loading">
    <div class="spinner"></div>
    Detectando localização...
  </div>`;

  navigator.geolocation.getCurrentPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    try {

      const response = await fetch(
        `https://api.opencagedata.com/geocode/v1/json?q=${lat}+${lon}&key=${apiKey}&language=pt`
      );

      const data = await response.json();

      if (!data.results.length) {
        throw new Error("Sem resultado");
      }

      const c = data.results[0].components;

      const endereco = `
${c.road || ""}
${c.house_number || ""}
- ${c.suburb || ""}
${c.city || ""}
`;

      const enderecoFinal = `${c.road || ""}, ${c.house_number || ""} - ${c.suburb || ""}, ${c.city || ""}`;

      salvarEndereco(enderecoFinal);

    } catch (error) {
      console.log(error);
      locationBox.innerHTML = "Erro ao buscar endereço ❌";
    }

  }, () => {
    locationBox.innerHTML = "❌ Permissão negada";
  },
  {
    enableHighAccuracy: true,
    timeout: 10000
  });
}
/* WHATS */
function pedir(){
  let e=localStorage.getItem("endereco")||"";
  window.location.href="https://wa.me/5599999999999?text="+encodeURIComponent("Pedido\nEndereço: "+e);
}

function adicionarCarrinho(produto) {
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

  carrinho.push(produto);

  localStorage.setItem("carrinho", JSON.stringify(carrinho));

  alert(produto + " adicionado!");
}

let produtoAtual = "";

function abrirPopup(nome) {
  produtoAtual = nome;

  document.getElementById("nomeProduto").innerText = nome;
  document.getElementById("popupProduto").style.display = "flex";
}

function confirmarProduto() {
  const sabor = document.getElementById("sabor").value;
  const obs = document.getElementById("observacao").value;

  const preparo = document.querySelector('input[name="preparo"]:checked').value;

  let precoBase = 39.90;
  let precoFinal = precoBase;

  if (preparo === "Pré-assada") {
    precoFinal -= 5;
  }

  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

  carrinho.push({
    nome: produtoAtual,
    sabor: sabor,
    preparo: preparo,
    observacao: obs,
    preco: precoFinal.toFixed(2)
  });

  localStorage.setItem("carrinho", JSON.stringify(carrinho));

  document.getElementById("popupProduto").style.display = "none";

  atualizarCarrinho();

  alert(`Adicionado!\n${preparo} - R$ ${precoFinal.toFixed(2)}`);
}

function atualizarCarrinho() {
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
  document.getElementById("cart-count").innerText = carrinho.length;
}

/* chama sempre que abrir o site */
window.onload = atualizarCarrinho;

function abrirCarrinho() {
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

  if (carrinho.length === 0) {
    alert("Carrinho vazio 🛒");
    return;
  }

  let mensagem = "🛒 Seu pedido:\n\n";

  carrinho.forEach(item => {
    mensagem += `• ${item.nome} (${item.sabor})\n`;
  });

  alert(mensagem);
}

</script>

</body>
</html>
