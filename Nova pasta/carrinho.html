<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.png" type="image/png">
<style>
  .delivery-toggle {
    display: flex;
    background: #f0f0f0;
    border-radius: 12px;
    padding: 5px;
    margin-top: 15px;
    margin-bottom: 15px;
  }
  .toggle-btn {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    font-size: 14px;
    font-weight: 600;
    color: #666;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .toggle-btn.ativa {
    background: #fff;
    color: #d62828;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .endereco-entrega {
    font-size: 14px;
    color: #444;
    background: #f9f9f9;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #eee;
    margin-top: 5px;
  }
</style>
</head>

<body>

    <div class="checkout-header">
  <button class="back-btn" onclick="history.back()">
    <span class="arrow">←</span>
  </button>
  <h1>Revise seus itens</h1>
</div>

<section id="itensCarrinho"></section>

<section class="card entrega">
  <h3>Entrega desejada</h3>

  <div class="delivery-toggle">
    <div class="toggle-btn ativa" id="btn-delivery" onclick="setEntrega('delivery')">
      🚚 Delivery
    </div>
    <div class="toggle-btn" id="btn-retirada" onclick="setEntrega('retirada')">
      🏪 Retirada
    </div>
  </div>

  <p class="endereco-entrega">
     <span id="endereco"></span>
  </p>
</section>

<section class="resumo">
  <div>
    <span>Subtotal</span>
    <strong id="subtotal">R$ 0,00</strong>
  </div>

  <div>
    <span>Taxa de entrega</span>
    <strong id="frete-text">R$ 10,00</strong>
  </div>

  <div class="total">
    <span>Total</span>
    <strong id="total">R$ 0,00</strong>
  </div>
</section>

<div class="payment-area">
  <button class="pay-btn" onclick="finalizarPedido()">Ir para pagamento</button>
</div>

<footer style="text-align: center; padding: 30px 10px 100px 10px; font-size: 12px; color: #888; background: #fafafa; border-top: 1px solid #eee;">
  © 2026 Casa da Pizza | Desenvolvido por <a href="https://www.instagram.com/thepixeloo/" target="_blank" style="color: #d32f2f; text-decoration: none; font-weight: bold;">@thepixeloo</a>
</footer>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

carrinho = carrinho.filter(item =>
  item && item.nome && item.preco && !isNaN(item.preco)
);

// Atualiza o localStorage removendo os itens quebrados
localStorage.setItem("carrinho", JSON.stringify(carrinho));

const container = document.getElementById("itensCarrinho");

function renderCarrinho(){

  container.innerHTML = "";
  let subtotal = 0;

  carrinho.forEach((item, i) => {

    const precoUnit = parseFloat(item.preco);
const qtd = item.qtd || 1;
const totalItem = precoUnit * qtd;

subtotal += totalItem;

    container.innerHTML += `
      <div class="item">
        <img src="${item.img || 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38'}">

        <div>
          <h4>${item.nome}</h4>
          <p>${item.sabor || ""}${item.preparo ? " • Opção: " + item.preparo : ""}</p>

          ${item.observacao ? `<small>📝 ${item.observacao}</small>` : ""}

          <p class="preco">R$ ${(precoUnit * qtd).toFixed(2)}</p>
        </div>

        <div class="qtd-box">
  <button onclick="menos(${i})">−</button>
  <span>${item.qtd || 1}</span>
  <button onclick="mais(${i})">+</button>
</div>
    `;
  });

  const tipoEntrega = localStorage.getItem("tipoEntrega") || "delivery";
  const frete = tipoEntrega === "retirada" ? 0 : (parseFloat(localStorage.getItem("freteUsuario")) || 10);
  
  document.getElementById("subtotal").innerText = "R$ " + subtotal.toFixed(2).replace('.', ',');
  document.getElementById("frete-text").innerText = tipoEntrega === "retirada" ? "Grátis" : ("R$ " + frete.toFixed(2).replace('.', ','));
  document.getElementById("total").innerText = "R$ " + (subtotal + frete).toFixed(2).replace('.', ',');
}

function remover(i){
  carrinho.splice(i,1);
  localStorage.setItem("carrinho",JSON.stringify(carrinho));
  renderCarrinho();
}

function mais(i){
  carrinho[i].qtd = (carrinho[i].qtd || 1) + 1;
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  renderCarrinho();
}

function menos(i){
  if((carrinho[i].qtd || 1) > 1){
    carrinho[i].qtd--;
    localStorage.setItem("carrinho", JSON.stringify(carrinho));
    renderCarrinho();
  } else {
    remover(i);
  }
}

renderCarrinho();

function setEntrega(tipo) {
  const btnDelivery = document.getElementById("btn-delivery");
  const btnRetirada = document.getElementById("btn-retirada");
  const enderecoEl = document.getElementById("endereco");

  localStorage.setItem("tipoEntrega", tipo);

  if (tipo === 'retirada') {
    btnRetirada.classList.add("ativa");
    btnDelivery.classList.remove("ativa");
    enderecoEl.textContent = "📍 Retirada: Rua Odilio de Medeiros 210 (Chatuba)";
  } else {
    btnDelivery.classList.add("ativa");
    btnRetirada.classList.remove("ativa");
    const enderecoSalvo = localStorage.getItem("enderecoUsuario");
    enderecoEl.textContent = enderecoSalvo ? `📍 ${enderecoSalvo}` : "📍 Endereço não encontrado";
  }

  renderCarrinho();
}

// Inicializa a entrega corretamente
const tipoAtual = localStorage.getItem("tipoEntrega") || "delivery";
setEntrega(tipoAtual);

window.addEventListener("storage", () => {
  const tipoAtual = localStorage.getItem("tipoEntrega") || "delivery";
  if (tipoAtual === "delivery") {
    const enderecoSalvo = localStorage.getItem("enderecoUsuario");
    const enderecoEl = document.getElementById("endereco");
    if (enderecoEl && enderecoSalvo) {
      enderecoEl.textContent = `📍 ${enderecoSalvo}`;
    }
  }
});

function finalizarPedido() {
  const carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
  const endereco = localStorage.getItem("enderecoUsuario");

  if (carrinho.length === 0) {
    alert("Seu carrinho está vazio 🛒");
    return;
  }

  const tipoEntrega = localStorage.getItem("tipoEntrega") || "delivery";
  if (tipoEntrega === "delivery" && !endereco) {
    alert("Por favor, selecione um endereço 📍");
    return;
  }

  // tudo certo → vai para pagamento
  window.location.href = "pagamento.html";
}



</script>

</body>
</html>
